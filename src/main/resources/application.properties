# Database\uC640 JPA \uC124\uC815\uC740 application-dev.properties\uC640 application-prod.properties\uC5D0\uC11C \uAD00\uB9AC
# (\uD504\uB85C\uD30C\uC77C\uBCC4\uB85C \uB2E4\uB978 DB \uC5F0\uACB0 \uC815\uBCF4 \uC0AC\uC6A9)

# JPA Common Settings (\uD504\uB85C\uD30C\uC77C \uACF5\uD1B5)
# default batch size
spring.jpa.properties.hibernate.default_batch_fetch_size=1000
# add comment in sql for easier debugging
spring.jpa.properties.hibernate.use_sql_comments=true
# confirm binding value of sql ?
logging.level.org.hibernate.type.descriptor.sql=trace

